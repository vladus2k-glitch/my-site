<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактор</title>

<style>
body{
margin:0;
font-family:Arial;
overflow-x:hidden;
touch-action:none;
}

/* кнопка */
#editBtn{
position:fixed;
top:10px;
left:10px;
padding:10px 14px;
background:black;
color:white;
border:none;
cursor:pointer;
z-index:1000;
font-size:14px;
}

/* панель */
#panel{
position:fixed;
top:50px;
left:10px;
background:white;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
z-index:1000;
width:180px;
font-size:14px;
border-radius:8px;
}

/* фон */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:#ddd;
}

/* контент */
#content{
position:relative;
width:100vw;
height:100vh;
padding:80px 10px;
}

/* слой */
.layer{
position:absolute;
padding:8px;
border:1px dashed gray;
background:rgba(255,255,255,0.7);
min-width:50px;
min-height:30px;
resize:both;
overflow:auto;
cursor:move;
font-size:16px;
border-radius:4px;
}

/* угол */
.layer::after{
content:"";
position:absolute;
right:0;
bottom:0;
width:10px;
height:10px;
background:gray;
cursor:se-resize;
}

/* 📱 адаптация */
@media (max-width:768px){
#panel{
width:90vw;
left:5vw;
}

#editBtn{
font-size:16px;
padding:12px;
}

.layer{
font-size:18px;
}
}
</style>
</head>

<body>

<div id="bg"></div>

<button id="editBtn">Edit</button>

<div id="panel">
Фон:
<input type="color" id="bgColor"><br><br>

Blur:
<input type="range" id="blur" min="0" max="10" value="0"><br><br>

<button onclick="addLayer()">+ слой</button>
<button onclick="save()">Save</button>
</div>

<div id="content">
<h1>Мой сайт</h1>
<p>Нажми Edit</p>
</div>

<script>
const PASSWORD = "1234";

const editBtn = document.getElementById("editBtn");
const panel = document.getElementById("panel");
const content = document.getElementById("content");
const bg = document.getElementById("bg");
const bgColor = document.getElementById("bgColor");
const blur = document.getElementById("blur");

editBtn.onclick = () => {
let pass = prompt("Пароль:");
if(pass === PASSWORD){
panel.style.display = "block";
content.contentEditable = true;
}else{
alert("Неверно");
}
};

/* фон */
bgColor.oninput = () => {
bg.style.background = bgColor.value;
};

/* blur */
blur.oninput = () => {
bg.style.filter = `blur(${blur.value}px)`;
};

/* слой */
function addLayer(){
let div = document.createElement("div");
div.className = "layer";
div.contentEditable = true;
div.innerText = "Новый слой";

div.style.top = "100px";
div.style.left = "100px";

let offsetX, offsetY;
let dragging = false;

div.addEventListener("mousedown", startDrag);
div.addEventListener("touchstart", startDrag);

function startDrag(e){
dragging = true;

let clientX = e.touches ? e.touches[0].clientX : e.clientX;
let clientY = e.touches ? e.touches[0].clientY : e.clientY;

offsetX = clientX - div.offsetLeft;
offsetY = clientY - div.offsetTop;

document.addEventListener("mousemove", move);
document.addEventListener("touchmove", move);
document.addEventListener("mouseup", stop);
document.addEventListener("touchend", stop);
}

function move(e){
if(!dragging) return;

let clientX = e.touches ? e.touches[0].clientX : e.clientX;
let clientY = e.touches ? e.touches[0].clientY : e.clientY;

div.style.left = (clientX - offsetX) + "px";
div.style.top = (clientY - offsetY) + "px";
}

function stop(){
dragging = false;
document.removeEventListener("mousemove", move);
document.removeEventListener("touchmove", move);
document.removeEventListener("mouseup", stop);
document.removeEventListener("touchend", stop);
}

content.appendChild(div);
}

/* save */
function save(){
localStorage.setItem("html", content.innerHTML);
localStorage.setItem("bg", bg.style.background);
localStorage.setItem("blur", blur.value);
alert("Saved");
}

/* load */
window.onload = () => {
let h = localStorage.getItem("html");
let b = localStorage.getItem("bg");
let bl = localStorage.getItem("blur");

if(h) content.innerHTML = h;
if(b) bg.style.background = b;
if(bl){
blur.value = bl;
bg.style.filter = `blur(${bl}px)`;
}
};
</script>

</body>
</html>
