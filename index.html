<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактор</title>

<style>
body{
margin:0;
font-family:Arial;
overflow-x:hidden;
touch-action:none;
}

#editBtn{
position:fixed;
top:10px;
left:10px;
padding:10px 14px;
background:black;
color:white;
border:none;
cursor:pointer;
z-index:1000;
}

#panel{
position:fixed;
top:50px;
left:10px;
background:white;
padding:10px;
display:none;
z-index:1000;
width:200px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:#ddd;
}

#content{
position:relative;
width:100vw;
height:100vh;
padding:80px 10px;
}

/* 🔲 общий слой */
.layer{
position:absolute;
min-width:60px;
min-height:40px;
padding:6px;
border:1px dashed gray;
background:rgba(255,255,255,0.7);
resize:both;
overflow:auto;
cursor:move;
}

/* 🖼 картинка */
.layer img{
max-width:100%;
height:100%;
display:block;
}

/* 📱 мобилка */
@media (max-width:768px){
#panel{
width:90vw;
left:5vw;
}
}
</style>
</head>

<body>

<div id="bg"></div>

<button id="editBtn">Edit</button>

<div id="panel">
<input type="color" id="bgColor"><br><br>

<input type="range" id="blur" min="0" max="10" value="0"><br><br>

<button onclick="addText()">+ Текст</button>
<button onclick="addImage()">+ Картинка</button>
<button onclick="save()">Save</button>
</div>

<div id="content">
<h1>Редактор</h1>
<p>Нажми Edit</p>
</div>

<script>
const PASSWORD = "1234";

const editBtn = document.getElementById("editBtn");
const panel = document.getElementById("panel");
const content = document.getElementById("content");
const bg = document.getElementById("bg");
const bgColor = document.getElementById("bgColor");
const blur = document.getElementById("blur");

/* открыть редактор */
editBtn.onclick = () => {
let pass = prompt("Пароль:");
if(pass === PASSWORD){
panel.style.display = "block";
content.contentEditable = true;
}
};

/* фон */
bgColor.oninput = () => {
bg.style.background = bgColor.value;
};

/* blur */
blur.oninput = () => {
bg.style.filter = `blur(${blur.value}px)`;
};

/* 🔥 DRAG функция */
function enableDrag(el){
let offsetX, offsetY;
let dragging = false;

el.addEventListener("mousedown", start);
el.addEventListener("touchstart", start);

function start(e){
dragging = true;

let x = e.touches ? e.touches[0].clientX : e.clientX;
let y = e.touches ? e.touches[0].clientY : e.clientY;

offsetX = x - el.offsetLeft;
offsetY = y - el.offsetTop;

document.addEventListener("mousemove", move);
document.addEventListener("touchmove", move);
document.addEventListener("mouseup", stop);
document.addEventListener("touchend", stop);
}

function move(e){
if(!dragging) return;

let x = e.touches ? e.touches[0].clientX : e.clientX;
let y = e.touches ? e.touches[0].clientY : e.clientY;

el.style.left = (x - offsetX) + "px";
el.style.top = (y - offsetY) + "px";
}

function stop(){
dragging = false;
document.removeEventListener("mousemove", move);
document.removeEventListener("touchmove", move);
document.removeEventListener("mouseup", stop);
document.removeEventListener("touchend", stop);
}
}

/* 📝 текст слой */
function addText(){
let div = document.createElement("div");
div.className = "layer";
div.contentEditable = true;
div.innerText = "Текст";

div.style.top = "100px";
div.style.left = "100px";

enableDrag(div);

content.appendChild(div);
}

/* 🖼 картинка слой */
function addImage(){
let url = prompt("Вставь ссылку на картинку:");

if(!url) return;

let div = document.createElement("div");
div.className = "layer";

let img = document.createElement("img");
img.src = url;

div.appendChild(img);

div.style.top = "150px";
div.style.left = "150px";

enableDrag(div);

content.appendChild(div);
}

/* 💾 save */
function save(){
localStorage.setItem("html", content.innerHTML);
localStorage.setItem("bg", bg.style.background);
localStorage.setItem("blur", blur.value);
alert("Saved");
}

/* load */
window.onload = () => {
let h = localStorage.getItem("html");
let b = localStorage.getItem("bg");
let bl = localStorage.getItem("blur");

if(h) content.innerHTML = h;
if(b) bg.style.background = b;
if(bl){
blur.value = bl;
bg.style.filter = `blur(${bl}px)`;
}
};
</script>

</body>
</html>
