<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Figma PRO</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
}

/* LEFT LAYERS */
#layers{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1e1e1e;
color:white;
padding:10px;
overflow:auto;
}

.layer{
padding:6px;
margin:4px 0;
background:#2a2a2a;
cursor:pointer;
font-size:13px;
}

.layer.active{
background:#4da3ff;
}

/* TOOLBAR */
#toolbar{
position:fixed;
top:0;
left:220px;
width:160px;
height:100%;
background:#111;
padding:10px;
box-sizing:border-box;
color:white;
}

button, input{
width:100%;
margin:5px 0;
font-size:12px;
padding:6px;
}

/* CANVAS */
#canvas{
margin-left:380px;
width:calc(100vw - 380px);
height:100vh;
position:relative;
background:#f5f5f5;
overflow:hidden;
}

.item{
position:absolute;
user-select:none;
}

.selected{
outline:2px solid #4da3ff;
}

/* MENU */
#menu{
position:fixed;
top:60px;
left:230px;
background:#222;
padding:10px;
display:none;
z-index:999;
}

#menu button{
width:100%;
margin:5px 0;
}

/* blur slider */
#blurPanel{
position:fixed;
bottom:10px;
left:230px;
background:#111;
color:white;
padding:10px;
display:none;
}
</style>
</head>

<body>

<div id="layers">
<button onclick="toggleMenu()" style="background:#4da3ff;">➕ Добавить слой</button>
</div>

<div id="menu">
<button onclick="addText()">Text</button>
<button onclick="addBox()">Box</button>
<button onclick="chooseImage()">Image</button>
</div>

<div id="toolbar">
<button onclick="del()">Delete</button>
</div>

<div id="blurPanel">
Blur: <input type="range" min="0" max="20" value="0" oninput="setBlur(this.value)">
</div>

<input type="file" id="imgUpload" style="display:none">

<div id="canvas"></div>

<script>
const canvas=document.getElementById("canvas");
const layers=document.getElementById("layers");
const menu=document.getElementById("menu");
const imgUpload=document.getElementById("imgUpload");
const blurPanel=document.getElementById("blurPanel");

let objects=[];
let selected=null;

/* TOGGLE MENU */
function toggleMenu(){
menu.style.display=menu.style.display==="block"?"none":"block";
}

/* CREATE OBJECT */
function create(type,extra={}){
return{
id:Date.now()+Math.random(),
type,
x:window.innerWidth/2,
y:window.innerHeight/2,
w:150,
h:80,
blur:0,
text:"Text",
src:"",
...extra
};
}

/* TEXT */
function addText(){
objects.push(create("text"));
menu.style.display="none";
render();
save();
}

/* BOX */
function addBox(){
objects.push(create("box",{w:120,h:120}));
menu.style.display="none";
render();
save();
}

/* IMAGE */
function chooseImage(){
imgUpload.click();
menu.style.display="none";
}

imgUpload.onchange=e=>{
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{
objects.push(create("image",{src:reader.result,w:200,h:150}));
render();
save();
};
reader.readAsDataURL(file);
};

/* DELETE */
function del(){
if(!selected)return;
objects=objects.filter(o=>o.id!==selected);
selected=null;
blurPanel.style.display="none";
render();
save();
}

/* BLUR */
function setBlur(val){
const obj=objects.find(o=>o.id===selected);
if(obj && obj.type==="image"){
obj.blur=val;
render();
save();
}
}

/* RENDER */
function render(){
canvas.innerHTML="";
layers.innerHTML='<button onclick="toggleMenu()" style="background:#4da3ff;">➕ Добавить слой</button>';

objects.forEach(obj=>{

const el=document.createElement("div");
el.className="item";

el.style.left=obj.x+"px";
el.style.top=obj.y+"px";
el.style.width=obj.w+"px";
el.style.height=obj.h+"px";

/* TEXT */
if(obj.type==="text"){
el.contentEditable=true;
el.innerText=obj.text;
el.style.display="flex";
el.style.alignItems="center";
el.style.justifyContent="center";
}

/* BOX */
if(obj.type==="box"){
el.style.background="red";
}

/* IMAGE + BLUR */
if(obj.type==="image"){
const img=document.createElement("img");
img.src=obj.src;
img.style.width="100%";
img.style.height="100%";
img.style.objectFit="cover";
img.style.filter=`blur(${obj.blur||0}px)`;
el.appendChild(img);
}

canvas.appendChild(el);

/* LAYER */
const layer=document.createElement("div");
layer.className="layer";
layer.innerText=obj.type;

layer.onclick=()=>{
select(obj.id);
};

layers.appendChild(layer);

/* INIT */
init(el,obj);
});
}

/* SELECT */
function select(id){
selected=id;

const obj=objects.find(o=>o.id===id);

/* blur panel */
if(obj && obj.type==="image"){
blurPanel.style.display="block";
blurPanel.querySelector("input").value=obj.blur||0;
}else{
blurPanel.style.display="none";
}

render();
}

/* DRAG */
function init(el,obj){

let down=false,ox,oy;

el.onmousedown=e=>{
down=true;
ox=e.offsetX;
oy=e.offsetY;
select(obj.id);
};

document.addEventListener("mousemove",e=>{
if(!down) return;

obj.x=e.pageX-ox-380;
obj.y=e.pageY-oy;

render();
});

document.addEventListener("mouseup",()=>{
if(down){
save();
down=false;
}
});
}

/* SAVE */
function save(){
localStorage.setItem("figma_pro",JSON.stringify(objects));
}

/* LOAD */
window.onload=()=>{
const saved=localStorage.getItem("figma_pro");
if(saved){
objects=JSON.parse(saved);
render();
}
};
</script>

</body>
</html>
