<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Figma Pro</title>

<style>
body{
margin:0;
font-family:Inter, Arial, sans-serif;
background:#1e1f22;
overflow:hidden;
}

/* TOP BAR (Figma style) */
#topbar{
position:fixed;
top:0;
left:0;
right:0;
height:44px;
background:#2c2d31;
display:flex;
align-items:center;
padding:0 10px;
gap:8px;
border-bottom:1px solid #1a1b1e;
z-index:1000;
}

button{
background:#3a3b40;
color:#e6e6e6;
border:none;
padding:6px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#4a4b52;
}

/* SIDEBAR */
#sidebar{
position:fixed;
top:44px;
left:0;
width:220px;
bottom:0;
background:#25262b;
border-right:1px solid #1a1b1e;
padding:10px;
color:#aaa;
overflow:auto;
}

.layer-item{
padding:6px 8px;
background:#2f3036;
margin-bottom:6px;
border-radius:6px;
cursor:pointer;
font-size:12px;
color:#ddd;
}

.layer-item:hover{
background:#3a3b42;
}

/* CANVAS */
#canvas{
position:absolute;
top:44px;
left:220px;
right:0;
bottom:0;
background:
linear-gradient(#2a2b30 1px, transparent 1px),
linear-gradient(90deg, #2a2b30 1px, transparent 1px);
background-size:20px 20px;
background-color:#1e1f22;
overflow:hidden;
}

/* OBJECTS */
.obj{
position:absolute;
min-width:60px;
min-height:40px;
background:white;
color:#111;
border:1px solid transparent;
border-radius:6px;
padding:6px;
box-sizing:border-box;
cursor:move;
font-size:13px;
}

/* selection like Figma */
.selected{
outline:2px solid #4c8dff;
}

/* resize handle */
.obj::after{
content:"";
position:absolute;
right:2px;
bottom:2px;
width:10px;
height:10px;
background:#4c8dff;
border-radius:2px;
cursor:se-resize;
}

/* EDIT hidden until login */
#editBtn{
display:none;
}
</style>
</head>

<body>

<div id="topbar">
<button id="editBtn" onclick="addText()">Text</button>
<button onclick="addBox()">Frame</button>
<button onclick="save()">Save</button>
</div>

<div id="sidebar">
<div style="font-size:11px;margin-bottom:8px;">LAYERS</div>
<div id="layers"></div>
</div>

<div id="canvas"></div>

<script>
const PASSWORD = "1234";

const canvas = document.getElementById("canvas");
const layers = document.getElementById("layers");
const editBtn = document.getElementById("editBtn");

let selected = null;

/* LOGIN */
window.onload = () => {
let pass = prompt("Password:");

if(pass === PASSWORD){
editBtn.style.display = "inline-block";
}else{
alert("No access");
}
};

/* SELECT */
function select(el){
if(selected) selected.classList.remove("selected");
selected = el;
selected.classList.add("selected");
}

/* DRAG + RESIZE */
function enable(el){

let dx, dy;
let drag = false;
let resize = false;

el.addEventListener("mousedown",(e)=>{

if(e.target !== el) return;

let r = el.getBoundingClientRect();

/* resize zone */
if(e.clientX > r.right - 15 && e.clientY > r.bottom - 15){
resize = true;
}else{
drag = true;
dx = e.clientX - el.offsetLeft;
dy = e.clientY - el.offsetTop;
}

select(el);
});

document.addEventListener("mousemove",(e)=>{

if(drag){
el.style.left = (e.clientX - dx) + "px";
el.style.top = (e.clientY - dy) + "px";
}

if(resize){
el.style.width = (e.clientX - el.offsetLeft) + "px";
el.style.height = (e.clientY - el.offsetTop) + "px";
}
});

document.addEventListener("mouseup",()=>{
drag = false;
resize = false;
});
}

/* TEXT */
function addText(){
let el = document.createElement("div");
el.className = "obj";
el.contentEditable = true;
el.innerText = "Text";
el.style.left = "120px";
el.style.top = "120px";

canvas.appendChild(el);
enable(el);
addLayer(el,"Text");
}

/* FRAME */
function addBox(){
let el = document.createElement("div");
el.className = "obj";
el.innerText = "Frame";
el.style.left = "160px";
el.style.top = "160px";
el.style.width = "140px";
el.style.height = "90px";

canvas.appendChild(el);
enable(el);
addLayer(el,"Frame");
}

/* LAYERS */
function addLayer(el,name){
let item = document.createElement("div");
item.className = "layer-item";
item.innerText = name;

item.onclick = ()=>select(el);

layers.appendChild(item);
}

/* DELETE + DUPLICATE */
document.addEventListener("keydown",(e)=>{
if(!selected) return;

/* DELETE */
if(e.key==="Delete"||e.key==="Backspace"){
selected.remove();
selected=null;
}

/* DUPLICATE */
if(e.ctrlKey && e.key.toLowerCase()==="d"){
e.preventDefault();

let copy = selected.cloneNode(true);

copy.style.left = (selected.offsetLeft + 20)+"px";
copy.style.top = (selected.offsetTop + 20)+"px";

canvas.appendChild(copy);
enable(copy);
select(copy);
addLayer(copy,"Copy");
}
});

/* SAVE */
function save(){
localStorage.setItem("figma_pro",canvas.innerHTML);
alert("saved");
}
</script>

</body>
</html>
