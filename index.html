<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Builder FIX</title>

<style>
body{
margin:0;
font-family:Arial;
}

#editBtn{
position:fixed;
top:10px;
left:10px;
padding:8px 12px;
background:black;
color:white;
border:none;
cursor:pointer;
display:none;
z-index:1000;
}

#panel{
position:fixed;
top:0;
left:0;
width:220px;
height:100%;
background:#111;
color:white;
padding:15px;
display:none;
z-index:999;
}

#panel button,#panel input{
width:100%;
margin-bottom:10px;
}

#canvas{
min-height:100vh;
position:relative;
}

.box{
position:absolute;
cursor:move;
user-select:none;
}

.selected{
outline:2px dashed #4da3ff;
}

/* resize handle */
.handle{
width:10px;
height:10px;
background:#4da3ff;
position:absolute;
right:-5px;
bottom:-5px;
cursor:se-resize;
display:none;
}
</style>
</head>

<body>

<button id="editBtn">Редактор</button>

<div id="panel">
<button id="addText">Добавить текст</button>
<input type="file" id="imgUpload">
<input type="color" id="bgColor">
<button id="delete">Удалить</button>
</div>

<div id="canvas"></div>

<script>
const ADMIN_KEY="123456";

const params=new URLSearchParams(location.search);
const isAdmin=params.get("admin")===ADMIN_KEY;

const editBtn=document.getElementById("editBtn");
const panel=document.getElementById("panel");
const canvas=document.getElementById("canvas");
const addText=document.getElementById("addText");
const imgUpload=document.getElementById("imgUpload");
const bgColor=document.getElementById("bgColor");
const del=document.getElementById("delete");

let selected=null;

if(isAdmin){
editBtn.style.display="block";
}

editBtn.onclick=()=>{
panel.style.display = panel.style.display==="block"?"none":"block";
};

// ADD TEXT
addText.onclick=()=>{
const el=document.createElement("div");
el.className="box";
el.contentEditable=true;
el.innerText="Текст";
el.style.left="100px";
el.style.top="100px";
el.style.width="150px";

addHandle(el);
canvas.appendChild(el);
make(el);
save();
};

// ADD IMAGE
imgUpload.onchange=e=>{
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{
const el=document.createElement("img");
el.src=reader.result;
el.className="box";
el.style.left="100px";
el.style.top="100px";
el.style.width="200px";
el.style.height="auto";
el.style.display="block";

addHandle(el);
canvas.appendChild(el);
make(el);
save();
};
reader.readAsDataURL(file);
};

// DELETE
del.onclick=()=>{
if(selected){
selected.remove();
selected=null;
save();
}
};

// BACKGROUND
bgColor.oninput=()=>{
document.body.style.background=bgColor.value;
save();
};

// SELECT + DRAG
function make(el){

const handle=el.querySelector(".handle");

el.onclick=(e)=>{
document.querySelectorAll(".box").forEach(b=>{
b.classList.remove("selected");
let h=b.querySelector(".handle");
if(h) h.style.display="none";
});

selected=el;
el.classList.add("selected");

if(handle) handle.style.display="block";

e.stopPropagation();
};

// drag
let down=false,ox,oy;

el.onmousedown=e=>{
if(e.target.classList.contains("handle")) return;

down=true;
ox=e.offsetX;
oy=e.offsetY;
};

document.addEventListener("mousemove",e=>{
if(!down) return;
el.style.left=(e.pageX-ox)+"px";
el.style.top=(e.pageY-oy)+"px";
});

document.addEventListener("mouseup",()=>{
if(down) save();
down=false;
});
}

// RESIZE FIXED (works for text + images)
function addHandle(el){
const h=document.createElement("div");
h.className="handle";
el.appendChild(h);

let resizing=false;

h.onmousedown=(e)=>{
e.stopPropagation();
resizing=true;

const startX=e.clientX;
const startY=e.clientY;

const startW=el.offsetWidth;
const startH=el.offsetHeight;

document.onmousemove=(ev)=>{
if(!resizing) return;

const newW=startW+(ev.clientX-startX);
const newH=startH+(ev.clientY-startY);

if(newW>30) el.style.width=newW+"px";
if(newH>30){
el.style.height=newH+"px";
}
};

document.onmouseup=()=>{
if(resizing) save();
resizing=false;
document.onmousemove=null;
};
};
}

// SAVE
function save(){
localStorage.setItem("site",canvas.innerHTML);
localStorage.setItem("bg",document.body.style.background);
}

// LOAD
window.onload=()=>{
const saved=localStorage.getItem("site");
const bg=localStorage.getItem("bg");

if(saved){
canvas.innerHTML=saved;

document.querySelectorAll(".box").forEach(el=>{
make(el);
if(!el.querySelector(".handle")) addHandle(el);
});
}

if(bg){
document.body.style.background=bg;
}
};
</script>

</body>
</html>
