<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Figma</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
}

#toolbar{
position:fixed;
top:10px;
left:10px;
background:#111;
padding:10px;
color:white;
z-index:1000;
display:none;
}

button{
margin:5px 0;
width:100%;
}

#canvas{
width:100vw;
height:100vh;
position:relative;
background:#f5f5f5;
overflow:hidden;
}

.item{
position:absolute;
user-select:none;
}

.selected{
outline:2px solid #4da3ff;
}

/* resize handles (Figma style) */
.handle{
width:10px;
height:10px;
background:#4da3ff;
position:absolute;
display:none;
}

.h-tl{top:-5px;left:-5px;cursor:nwse-resize;}
.h-tr{top:-5px;right:-5px;cursor:nesw-resize;}
.h-bl{bottom:-5px;left:-5px;cursor:nesw-resize;}
.h-br{bottom:-5px;right:-5px;cursor:nwse-resize;}
</style>
</head>

<body>

<div id="toolbar">
<button onclick="addText()">Text</button>
<button onclick="addBox()">Box</button>
<button onclick="del()">Delete</button>
</div>

<div id="canvas"></div>

<script>
const ADMIN="123456";
const isAdmin=new URLSearchParams(location.search).get("admin")===ADMIN;

const canvas=document.getElementById("canvas");
const toolbar=document.getElementById("toolbar");

let selected=null;

if(isAdmin){
toolbar.style.display="block";
}

// CREATE TEXT
function addText(){
const el=document.createElement("div");
el.className="item";
el.contentEditable=true;
el.innerText="Text";
el.style.left="100px";
el.style.top="100px";
el.style.fontSize="20px";
el.style.width="120px";
canvas.appendChild(el);
init(el);
save();
}

// CREATE BOX
function addBox(){
const el=document.createElement("div");
el.className="item";
el.style.left="100px";
el.style.top="100px";
el.style.width="120px";
el.style.height="120px";
el.style.background="red";
canvas.appendChild(el);
init(el);
save();
}

// DELETE
function del(){
if(selected){
selected.remove();
selected=null;
save();
}
}

// INIT ELEMENT
function init(el){

el.onclick=(e)=>{
if(!isAdmin) return;

select(el);
e.stopPropagation();
};

// drag
let down=false,ox,oy;

el.onmousedown=e=>{
if(!isAdmin) return;
if(e.target.classList.contains("handle")) return;

down=true;
ox=e.offsetX;
oy=e.offsetY;
};

document.addEventListener("mousemove",e=>{
if(!down) return;
el.style.left=(e.pageX-ox)+"px";
el.style.top=(e.pageY-oy)+"px";
});

document.addEventListener("mouseup",()=>{
if(down) save();
down=false;
});

// resize handles
["tl","tr","bl","br"].forEach(pos=>{
const h=document.createElement("div");
h.className="handle h-"+pos;
el.appendChild(h);

let resizing=false;

h.onmousedown=e=>{
if(!isAdmin) return;

e.stopPropagation();
resizing=true;

const startX=e.clientX;
const startY=e.clientY;
const startW=el.offsetWidth;
const startH=el.offsetHeight;
const startL=parseInt(el.style.left);
const startT=parseInt(el.style.top);

document.onmousemove=ev=>{
if(!resizing) return;

if(pos==="br"){
el.style.width=startW+(ev.clientX-startX)+"px";
el.style.height=startH+(ev.clientY-startY)+"px";
}

if(pos==="bl"){
el.style.width=startW-(ev.clientX-startX)+"px";
el.style.height=startH+(ev.clientY-startY)+"px";
el.style.left=startL+(ev.clientX-startX)+"px";
}

if(pos==="tr"){
el.style.width=startW+(ev.clientX-startX)+"px";
el.style.height=startH-(ev.clientY-startY)+"px";
el.style.top=startT+(ev.clientY-startY)+"px";
}

if(pos==="tl"){
el.style.width=startW-(ev.clientX-startX)+"px";
el.style.height=startH-(ev.clientY-startY)+"px";
el.style.left=startL+(ev.clientX-startX)+"px";
el.style.top=startT+(ev.clientY-startY)+"px";
}
};

document.onmouseup=()=>{
resizing=false;
document.onmousemove=null;
save();
};
};
});
}

// SELECT
function select(el){
document.querySelectorAll(".item").forEach(i=>{
i.classList.remove("selected");
i.querySelectorAll(".handle").forEach(h=>h.style.display="none");
});

selected=el;
el.classList.add("selected");
el.querySelectorAll(".handle").forEach(h=>h.style.display="block");
}

// SAVE
function save(){
localStorage.setItem("figma",canvas.innerHTML);
}

// LOAD
window.onload=()=>{
const saved=localStorage.getItem("figma");
if(saved){
canvas.innerHTML=saved;
document.querySelectorAll(".item").forEach(init);
}
};
</script>

</body>
</html>
