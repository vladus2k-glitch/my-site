<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Figma Stable</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
}

#layers{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#1e1e1e;
color:white;
padding:10px;
overflow:auto;
}

.layer{
padding:6px;
margin:4px 0;
background:#2a2a2a;
cursor:pointer;
font-size:14px;
}

.layer.active{
background:#4da3ff;
}

#toolbar{
position:fixed;
top:10px;
left:210px;
background:#111;
padding:10px;
color:white;
display:none;
z-index:1000;
}

button, input{
width:100%;
margin:5px 0;
}

#canvas{
margin-left:200px;
width:calc(100vw - 200px);
height:100vh;
position:relative;
background:#f5f5f5;
overflow:hidden;
}

.item{
position:absolute;
user-select:none;
}

.selected{
outline:2px solid #4da3ff;
}

.handle{
width:10px;
height:10px;
background:#4da3ff;
position:absolute;
display:none;
}
.h-tl{top:-5px;left:-5px;cursor:nwse-resize;}
.h-tr{top:-5px;right:-5px;cursor:nesw-resize;}
.h-bl{bottom:-5px;left:-5px;cursor:nesw-resize;}
.h-br{bottom:-5px;right:-5px;cursor:nwse-resize;}
</style>
</head>

<body>

<div id="layers"></div>

<div id="toolbar">
<button onclick="addText()">Text</button>
<button onclick="addBox()">Box</button>
<input type="file" id="imgUpload">
<button onclick="del()">Delete</button>
</div>

<div id="canvas"></div>

<script>
const ADMIN="123456";
const isAdmin=new URLSearchParams(location.search).get("admin")===ADMIN;

const canvas=document.getElementById("canvas");
const layers=document.getElementById("layers");
const toolbar=document.getElementById("toolbar");
const imgUpload=document.getElementById("imgUpload");

let selected=null;

if(isAdmin){
toolbar.style.display="block";
}

/* ===== DATA SYSTEM (ВАЖНО) ===== */
let objects=[];

/* CREATE OBJECT */
function createObject(type,extra={}){
return{
id:Date.now()+Math.random(),
type,
x:100,
y:100,
w:120,
h:80,
text:"Text",
src:"",
...extra
};
}

/* ADD TEXT */
function addText(){
const obj=createObject("text",{text:"Text"});
objects.push(obj);
render();
save();
}

/* ADD BOX */
function addBox(){
const obj=createObject("box",{w:120,h:120});
objects.push(obj);
render();
save();
}

/* ADD IMAGE */
imgUpload.onchange=e=>{
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{
const obj=createObject("image",{
src:reader.result,
w:200,
h:150
});

objects.push(obj);
render();
save();
};

reader.readAsDataURL(file);
};

/* DELETE */
function del(){
if(!selected)return;
objects=objects.filter(o=>o.id!==selected);
selected=null;
render();
save();
}

/* RENDER */
function render(){
canvas.innerHTML="";
layers.innerHTML="";

objects.forEach(obj=>{

// canvas element
const el=document.createElement("div");
el.className="item";
el.style.left=obj.x+"px";
el.style.top=obj.y+"px";
el.style.width=obj.w+"px";
el.style.height=obj.h+"px";

if(obj.type==="text"){
el.contentEditable=true;
el.innerText=obj.text;
}

if(obj.type==="box"){
el.style.background="red";
}

if(obj.type==="image"){
const img=document.createElement("img");
img.src=obj.src;
img.style.width="100%";
img.style.height="100%";
img.style.objectFit="cover";
el.appendChild(img);
}

canvas.appendChild(el);

// layer
const layer=document.createElement("div");
layer.className="layer";
layer.innerText=obj.type;

layer.onclick=()=>{
select(obj.id);
};

layers.appendChild(layer);

// init interaction
init(el,obj.id);
});
}

/* SELECT */
function select(id){
selected=id;

document.querySelectorAll(".item").forEach(el=>{
el.classList.remove("selected");
el.querySelectorAll(".handle").forEach(h=>h.style.display="none");
});

const el=[...document.querySelectorAll(".item")][
objects.findIndex(o=>o.id===id)
];

if(el){
el.classList.add("selected");
el.querySelectorAll(".handle").forEach(h=>h.style.display="block");
}

updateLayers();
}

/* INIT DRAG + RESIZE */
function init(el,id){

let obj=objects.find(o=>o.id===id);

/* DRAG */
let down=false,ox,oy;

el.onmousedown=e=>{
if(!isAdmin) return;
if(e.target.classList.contains("handle")) return;

down=true;
ox=e.offsetX;
oy=e.offsetY;
select(id);
};

document.addEventListener("mousemove",e=>{
if(!down) return;

obj.x=e.pageX-ox-200;
obj.y=e.pageY-oy;

render();
});

document.addEventListener("mouseup",()=>{
if(down){
save();
down=false;
}
});

/* RESIZE */
addResize(el,obj);
}

/* RESIZE */
function addResize(el,obj){

["br"].forEach(()=>{
const h=document.createElement("div");
h.className="handle h-br";
el.appendChild(h);

let resizing=false;

h.onmousedown=e=>{
if(!isAdmin) return;
e.stopPropagation();
resizing=true;

const startX=e.clientX;
const startY=e.clientY;

document.onmousemove=ev=>{
if(!resizing) return;

obj.w=Math.max(30, obj.w+(ev.clientX-startX));
obj.h=Math.max(30, obj.h+(ev.clientY-startY));

render();
};

document.onmouseup=()=>{
resizing=false;
document.onmousemove=null;
save();
};
};
});
}

/* SAVE */
function save(){
localStorage.setItem("figma_data",JSON.stringify(objects));
}

/* LOAD */
window.onload=()=>{
const saved=localStorage.getItem("figma_data");
if(saved){
objects=JSON.parse(saved);
render();
}
};
</script>

</body>
</html>
