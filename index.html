<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editable Site</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
transition:0.3s;
}

#editBtn{
position:fixed;
top:10px;
left:10px;
padding:8px 14px;
background:black;
color:white;
border:none;
cursor:pointer;
z-index:1000;
border-radius:6px;
}

#panel{
position:fixed;
top:50px;
left:10px;
background:white;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
z-index:1000;
border-radius:8px;
}

[contenteditable="true"]{
outline:2px dashed gray;
}

#content{
padding:70px 20px;
}
</style>
</head>

<body>

<button id="editBtn">Редактировать</button>

<div id="panel">
<div>
Задний фон:
<input type="color" id="bgColor">
</div>
<br>
<button onclick="save()">Сохранить</button>
</div>

<div id="content" contenteditable="false">
<h1>Мой сайт</h1>
<p>Нажми "Редактировать" чтобы изменить текст.</p>
</div>

<script>
const PASSWORD = "1234";

const editBtn = document.getElementById("editBtn");
const panel = document.getElementById("panel");
const content = document.getElementById("content");
const bgColor = document.getElementById("bgColor");

editBtn.onclick = () => {
let pass = prompt("Введите пароль");
if(pass === PASSWORD){
content.contentEditable = true;
panel.style.display = "block";
}else{
alert("Неверный пароль");
}
};

function save(){
localStorage.setItem("site-content", content.innerHTML);
localStorage.setItem("site-bg", document.body.style.background);
}

bgColor.oninput = () => {
document.body.style.background = bgColor.value;
};

window.onload = () => {
const savedContent = localStorage.getItem("site-content");
const savedBg = localStorage.getItem("site-bg");

if(savedContent) content.innerHTML = savedContent;
if(savedBg) document.body.style.background = savedBg;
};
</script>

</body>
</html>
