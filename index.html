<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
}

#editBtn{
position:fixed;
top:10px;
left:10px;
padding:8px 12px;
background:black;
color:white;
border:none;
cursor:pointer;
display:none;
z-index:1000;
}

#panel{
position:fixed;
top:50px;
left:10px;
background:white;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
z-index:1000;
}

#canvas{
position:relative;
width:100%;
height:2000px;
}

.draggable{
position:absolute;
cursor:move;
}
</style>
</head>

<body>

<button id="editBtn">Редактировать</button>

<div id="panel">
<button id="addText">Добавить текст</button>
<br><br>
<input type="file" id="imgUpload">
<br><br>
Фон:
<input type="color" id="bgColor">
</div>

<div id="canvas"></div>

<script>
const ADMIN_KEY = "123456";

const params = new URLSearchParams(location.search);
const isAdmin = params.get("admin") === ADMIN_KEY;

const editBtn = document.getElementById("editBtn");
const panel = document.getElementById("panel");
const canvas = document.getElementById("canvas");
const addTextBtn = document.getElementById("addText");
const imgUpload = document.getElementById("imgUpload");
const bgColor = document.getElementById("bgColor");

if(isAdmin){
editBtn.style.display = "block";
}

editBtn.onclick = () => {
panel.style.display = "block";
};

// добавление текста
addTextBtn.onclick = () => {
const div = document.createElement("div");
div.className = "draggable";
div.contentEditable = true;
div.innerText = "Текст";
div.style.left = "100px";
div.style.top = "100px";
canvas.appendChild(div);
drag(div);
save();
};

// загрузка картинки
imgUpload.onchange = function(){
const file = this.files[0];
if(!file) return;

const reader = new FileReader();
reader.onload = function(e){
const img = document.createElement("img");
img.src = e.target.result;
img.className = "draggable";
img.style.left = "100px";
img.style.top = "100px";
img.style.width = "200px";

canvas.appendChild(img);
drag(img);
save();
};
reader.readAsDataURL(file);
};

// перетаскивание
function drag(el){
let isDown=false,offsetX,offsetY;

el.onmousedown = function(e){
isDown=true;
offsetX = e.offsetX;
offsetY = e.offsetY;
};

document.addEventListener("mousemove",function(e){
if(!isDown) return;
el.style.left = (e.pageX-offsetX)+"px";
el.style.top = (e.pageY-offsetY)+"px";
});

document.addEventListener("mouseup",function(){
if(isDown) save();
isDown=false;
});
}

// фон
bgColor.oninput = function(){
document.body.style.background = this.value;
save();
};

// сохранить
function save(){
localStorage.setItem("canvas",canvas.innerHTML);
localStorage.setItem("bg",document.body.style.background);
}

// загрузить
window.onload = function(){
const saved = localStorage.getItem("canvas");
const bg = localStorage.getItem("bg");

if(saved){
canvas.innerHTML = saved;
document.querySelectorAll(".draggable").forEach(drag);
}

if(bg){
document.body.style.background = bg;
}
};
</script>

</body>
</html>
