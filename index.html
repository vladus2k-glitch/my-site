<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma Fix UI</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
}

/* LEFT LAYERS PANEL */
#layers{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1e1e1e;
color:white;
padding:10px;
overflow:auto;
}

/* LAYER ITEM */
.layer{
padding:6px;
margin:4px 0;
background:#2a2a2a;
cursor:pointer;
font-size:13px;
}

.layer.active{
background:#4da3ff;
}

/* TOOLBAR (RIGHT PANEL) */
#toolbar{
position:fixed;
top:0;
left:220px;
width:160px;   /* УМЕНЬШИЛ */
height:100%;
background:#111;
padding:10px;
box-sizing:border-box;
}

button, input{
width:100%;
margin:5px 0;
padding:6px;   /* УМЕНЬШИЛ КНОПКИ */
font-size:12px;
}

/* CANVAS */
#canvas{
margin-left:380px;
width:calc(100vw - 380px);
height:100vh;
position:relative;
background:#f5f5f5;
overflow:hidden;
}

/* OBJECT */
.item{
position:absolute;
user-select:none;
}

/* selected */
.selected{
outline:2px solid #4da3ff;
}
</style>
</head>

<body>

<!-- LEFT LAYERS -->
<div id="layers">
<button onclick="addLayer()" style="background:#4da3ff;">➕ Добавить слой</button>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
<button onclick="addText()">Text</button>
<button onclick="addBox()">Box</button>
<input type="file" id="imgUpload">
<button onclick="del()">Delete</button>
</div>

<!-- CANVAS -->
<div id="canvas"></div>

<script>
const canvas=document.getElementById("canvas");
const layers=document.getElementById("layers");
const imgUpload=document.getElementById("imgUpload");

let objects=[];
let selected=null;

/* ===== ADD LAYER (TEXT) ===== */
function addLayer(){
const obj={
id:Date.now()+Math.random(),
type:"text",
x:window.innerWidth/2-50,   // ЦЕНТР ЭКРАНА
y:window.innerHeight/2-25,
w:120,
h:40,
text:"Text"
};

objects.push(obj);
render();
save();
}

/* ADD TEXT (RIGHT BUTTON) */
function addText(){
addLayer();
}

/* BOX */
function addBox(){
const obj={
id:Date.now()+Math.random(),
type:"box",
x:window.innerWidth/2-50,
y:window.innerHeight/2-50,
w:120,
h:120
};

objects.push(obj);
render();
save();
}

/* IMAGE */
imgUpload.onchange=e=>{
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{
objects.push({
id:Date.now()+Math.random(),
type:"image",
x:window.innerWidth/2-100,
y:window.innerHeight/2-75,
w:200,
h:150,
src:reader.result
});

render();
save();
};

reader.readAsDataURL(file);
};

/* DELETE */
function del(){
if(!selected)return;
objects=objects.filter(o=>o.id!==selected);
selected=null;
render();
save();
}

/* RENDER */
function render(){
canvas.innerHTML="";
layers.innerHTML='<button onclick="addLayer()" style="background:#4da3ff;">➕ Добавить слой</button>';

objects.forEach(obj=>{

// element
const el=document.createElement("div");
el.className="item";
el.style.left=obj.x+"px";
el.style.top=obj.y+"px";
el.style.width=obj.w+"px";
el.style.height=obj.h+"px";

if(obj.type==="text"){
el.contentEditable=true;
el.innerText=obj.text;
el.style.display="flex";
el.style.alignItems="center";
el.style.justifyContent="center";
el.style.fontSize="18px";
}

if(obj.type==="box"){
el.style.background="red";
}

if(obj.type==="image"){
const img=document.createElement("img");
img.src=obj.src;
img.style.width="100%";
img.style.height="100%";
img.style.objectFit="cover";
el.appendChild(img);
}

canvas.appendChild(el);

// layer UI
const layer=document.createElement("div");
layer.className="layer";
layer.innerText=obj.type;

if(obj.id===selected) layer.classList.add("active");

layer.onclick=()=>selected=obj.id;

layers.appendChild(layer);

// drag
init(el,obj);
});
}

/* DRAG */
function init(el,obj){

let down=false,ox,oy;

el.onmousedown=e=>{
down=true;
ox=e.offsetX;
oy=e.offsetY;
selected=obj.id;
render();
};

document.addEventListener("mousemove",e=>{
if(!down) return;

obj.x=e.pageX-ox-380;
obj.y=e.pageY-oy;

render();
});

document.addEventListener("mouseup",()=>{
if(down){
save();
down=false;
}
});
}

/* SAVE */
function save(){
localStorage.setItem("figma_fix",JSON.stringify(objects));
}

/* LOAD */
window.onload=()=>{
const saved=localStorage.getItem("figma_fix");
if(saved){
objects=JSON.parse(saved);
render();
}
};
</script>

</body>
</html>
