<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Figma FIX</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
}

/* LEFT LAYERS */
#layers{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#1e1e1e;
color:white;
padding:10px;
overflow-y:auto;
}

.layer{
padding:6px;
margin:4px 0;
background:#2a2a2a;
cursor:pointer;
font-size:14px;
}

.layer.active{
background:#4da3ff;
}

/* TOOLBAR */
#toolbar{
position:fixed;
top:10px;
left:210px;
background:#111;
padding:10px;
color:white;
display:none;
z-index:1000;
}

button, input{
width:100%;
margin:5px 0;
}

/* CANVAS */
#canvas{
margin-left:200px;
width:calc(100vw - 200px);
height:100vh;
position:relative;
background:#f5f5f5;
overflow:hidden;
}

.item{
position:absolute;
user-select:none;
}

.selected{
outline:2px solid #4da3ff;
}

/* resize */
.handle{
width:10px;
height:10px;
background:#4da3ff;
position:absolute;
display:none;
}
.h-tl{top:-5px;left:-5px;cursor:nwse-resize;}
.h-tr{top:-5px;right:-5px;cursor:nesw-resize;}
.h-bl{bottom:-5px;left:-5px;cursor:nesw-resize;}
.h-br{bottom:-5px;right:-5px;cursor:nwse-resize;}
</style>
</head>

<body>

<div id="layers"></div>

<div id="toolbar">
<button onclick="addText()">Добавить текст</button>
<input type="file" id="imgUpload">
<button onclick="addBox()">Добавить блок</button>
<button onclick="del()">Удалить</button>
</div>

<div id="canvas"></div>

<script>
const ADMIN="123456";
const isAdmin=new URLSearchParams(location.search).get("admin")===ADMIN;

const canvas=document.getElementById("canvas");
const layers=document.getElementById("layers");
const toolbar=document.getElementById("toolbar");
const imgUpload=document.getElementById("imgUpload");

let selected=null;

if(isAdmin){
toolbar.style.display="block";
}

/* TEXT */
function addText(){
const el=createItem("Text");
el.contentEditable=true;
el.innerText="Text";
el.style.width="120px";
el.style.height="50px";

canvas.appendChild(el);
init(el);
updateLayers();
save();
}

/* BOX */
function addBox(){
const el=createItem("Box");
el.style.width="120px";
el.style.height="120px";
el.style.background="red";

canvas.appendChild(el);
init(el);
updateLayers();
save();
}

/* IMAGE */
imgUpload.onchange=e=>{
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{

const el=createItem("Image");

const img=document.createElement("img");
img.src=reader.result;
img.style.width="100%";
img.style.height="100%";
img.style.objectFit="cover";

el.style.width="200px";
el.style.height="150px";

el.appendChild(img);

canvas.appendChild(el);
init(el);
updateLayers();
save();
};

reader.readAsDataURL(file);
};

/* CREATE ITEM */
function createItem(name){
const el=document.createElement("div");
el.className="item";
el.style.left="100px";
el.style.top="100px";
el.dataset.name=name;
return el;
}

/* DELETE */
function del(){
if(selected){
selected.remove();
selected=null;
updateLayers();
save();
}
}

/* INIT */
function init(el){

el.onclick=(e)=>{
if(!isAdmin) return;
select(el);
e.stopPropagation();
};

/* drag */
let down=false,ox,oy;

el.onmousedown=e=>{
if(!isAdmin) return;
if(e.target.classList.contains("handle")) return;

down=true;
ox=e.offsetX;
oy=e.offsetY;
};

document.addEventListener("mousemove",e=>{
if(!down) return;
el.style.left=(e.pageX-ox-200)+"px";
el.style.top=(e.pageY-oy)+"px";
});

document.addEventListener("mouseup",()=>{
if(down){
save();
updateLayers();
}
down=false;
});

/* resize */
addResize(el);
}

/* SELECT */
function select(el){
document.querySelectorAll(".item").forEach(i=>{
i.classList.remove("selected");
i.querySelectorAll(".handle").forEach(h=>h.style.display="none");
});

selected=el;
el.classList.add("selected");
el.querySelectorAll(".handle").forEach(h=>h.style.display="block");

updateLayers();
}

/* LAYERS */
function updateLayers(){
layers.innerHTML="";

document.querySelectorAll(".item").forEach((el,i)=>{
const div=document.createElement("div");
div.className="layer";
div.innerText=el.dataset.name || "Layer "+i;

if(el===selected) div.classList.add("active");

div.onclick=()=>{
select(el);
};

layers.appendChild(div);
});
}

/* RESIZE */
function addResize(el){
["tl","tr","bl","br"].forEach(pos=>{
const h=document.createElement("div");
h.className="handle h-"+pos;
el.appendChild(h);

let resizing=false;

h.onmousedown=e=>{
if(!isAdmin) return;

e.stopPropagation();
resizing=true;

const startX=e.clientX;
const startY=e.clientY;
const startW=el.offsetWidth;
const startH=el.offsetHeight;
const startL=parseInt(el.style.left);
const startT=parseInt(el.style.top);

document.onmousemove=ev=>{
if(!resizing) return;

if(pos==="br"){
el.style.width=startW+(ev.clientX-startX)+"px";
el.style.height=startH+(ev.clientY-startY)+"px";
}

if(pos==="bl"){
el.style.width=startW-(ev.clientX-startX)+"px";
el.style.height=startH+(ev.clientY-startY)+"px";
el.style.left=startL+(ev.clientX-startX)+"px";
}

if(pos==="tr"){
el.style.width=startW+(ev.clientX-startX)+"px";
el.style.height=startH-(ev.clientY-startY)+"px";
el.style.top=startT+(ev.clientY-startY)+"px";
}

if(pos==="tl"){
el.style.width=startW-(ev.clientX-startX)+"px";
el.style.height=startH-(ev.clientY-startY)+"px";
el.style.left=startL+(ev.clientX-startX)+"px";
el.style.top=startT+(ev.clientY-startY)+"px";
}
};

document.onmouseup=()=>{
resizing=false;
document.onmousemove=null;
save();
};
};
});
}

/* SAVE */
function save(){
localStorage.setItem("figma",canvas.innerHTML);
}

/* LOAD */
window.onload=()=>{
const saved=localStorage.getItem("figma");
if(saved){
canvas.innerHTML=saved;
document.querySelectorAll(".item").forEach(init);
}
};
</script>

</body>
</html>
