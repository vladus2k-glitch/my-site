<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Builder</title>

<style>
body{
margin:0;
font-family:Arial;
}

#editBtn{
position:fixed;
top:10px;
left:10px;
padding:8px 12px;
background:black;
color:white;
border:none;
cursor:pointer;
display:none;
z-index:1000;
}

#panel{
position:fixed;
top:0;
left:0;
width:220px;
height:100%;
background:#111;
color:white;
padding:15px;
display:none;
z-index:999;
}

#panel button,
#panel input{
width:100%;
margin-bottom:10px;
}

#canvas{
margin-left:0;
min-height:100vh;
position:relative;
}

.editing #canvas{
margin-left:220px;
}

.box{
position:absolute;
cursor:move;
}

.selected{
outline:2px dashed blue;
}
</style>
</head>

<body>

<button id="editBtn">Редактор</button>

<div id="panel">
<button id="addText">Добавить текст</button>
<input type="file" id="imgUpload">
<input type="color" id="bgColor">
<button id="delete">Удалить</button>
</div>

<div id="canvas"></div>

<script>
const ADMIN_KEY="123456";

const params=new URLSearchParams(location.search);
const isAdmin=params.get("admin")===ADMIN_KEY;

const editBtn=document.getElementById("editBtn");
const panel=document.getElementById("panel");
const canvas=document.getElementById("canvas");
const addText=document.getElementById("addText");
const imgUpload=document.getElementById("imgUpload");
const bgColor=document.getElementById("bgColor");
const deleteBtn=document.getElementById("delete");

let selected=null;
let editing=false;

if(isAdmin){
editBtn.style.display="block";
}

editBtn.onclick=()=>{
editing=!editing;

panel.style.display=editing?"block":"none";
document.body.classList.toggle("editing");
};

addText.onclick=()=>{
const div=document.createElement("div");
div.className="box";
div.contentEditable=true;
div.innerText="Текст";
div.style.left="100px";
div.style.top="100px";
div.style.fontSize="20px";

canvas.appendChild(div);
make(div);
save();
};

imgUpload.onchange=e=>{
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{
const img=document.createElement("img");
img.src=reader.result;
img.className="box";
img.style.left="100px";
img.style.top="100px";
img.style.width="200px";

canvas.appendChild(img);
make(img);
save();
};

reader.readAsDataURL(file);
};

deleteBtn.onclick=()=>{
if(selected){
selected.remove();
selected=null;
save();
}
};

bgColor.oninput=()=>{
document.body.style.background=bgColor.value;
save();
};

function make(el){
drag(el);

el.onclick=e=>{
if(!editing) return;
document.querySelectorAll(".box").forEach(b=>b.classList.remove("selected"));
selected=el;
el.classList.add("selected");
e.stopPropagation();
};
}

function drag(el){
let down=false,ox,oy;

el.onmousedown=e=>{
if(!editing) return;
down=true;
ox=e.offsetX;
oy=e.offsetY;
};

document.addEventListener("mousemove",e=>{
if(!down) return;
el.style.left=(e.pageX-ox)+"px";
el.style.top=(e.pageY-oy)+"px";
});

document.addEventListener("mouseup",()=>{
if(down) save();
down=false;
});
}

function save(){
localStorage.setItem("site",canvas.innerHTML);
localStorage.setItem("bg",document.body.style.background);
}

window.onload=()=>{
const saved=localStorage.getItem("site");
const bg=localStorage.getItem("bg");

if(saved){
canvas.innerHTML=saved;
document.querySelectorAll(".box").forEach(make);
}

if(bg){
document.body.style.background=bg;
}
};
</script>

</body>
</html>
