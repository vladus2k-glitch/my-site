<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Figma</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
}

#layers{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1e1e1e;
color:white;
padding:10px;
overflow:auto;
}

.layer{
padding:6px;
margin:4px 0;
background:#2a2a2a;
cursor:pointer;
}

.layer.active{
background:#4da3ff;
}

#toolbar{
position:fixed;
top:0;
left:220px;
width:200px;
height:100%;
background:#111;
padding:10px;
color:white;
box-sizing:border-box;
}

button, input{
width:100%;
margin:6px 0;
}

#canvas{
margin-left:420px;
width:calc(100vw - 420px);
height:100vh;
position:relative;
background:#f5f5f5;
overflow:hidden;
}

.item{
position:absolute;
user-select:none;
}

.selected{
outline:2px solid #4da3ff;
}

.handle{
width:10px;
height:10px;
background:#4da3ff;
position:absolute;
right:-5px;
bottom:-5px;
cursor:se-resize;
display:none;
}
</style>
</head>

<body>

<div id="layers"></div>

<div id="toolbar">
<button onclick="addText()">➕ Текст</button>
<button onclick="addImage()">🖼 Картинка</button>
<button onclick="del()">🗑 Удалить</button>
<input type="file" id="imgUpload">
</div>

<div id="canvas"></div>

<script>
const canvas=document.getElementById("canvas");
const layers=document.getElementById("layers");
const imgUpload=document.getElementById("imgUpload");

let objects=[];
let selected=null;

/* CREATE TEXT */
function addText(){
objects.push({
id:Date.now()+Math.random(),
type:"text",
x:100,y:100,
w:150,h:50,
text:"Текст"
});
render();
save();
}

/* CREATE IMAGE BUTTON */
function addImage(){
imgUpload.click();
}

/* IMAGE LOAD */
imgUpload.onchange=e=>{
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{
objects.push({
id:Date.now()+Math.random(),
type:"image",
x:100,y:100,
w:200,h:150,
src:reader.result
});
render();
save();
};
reader.readAsDataURL(file);
};

/* DELETE */
function del(){
objects=objects.filter(o=>o.id!==selected);
selected=null;
render();
save();
}

/* RENDER */
function render(){
canvas.innerHTML="";
layers.innerHTML="";

objects.forEach(obj=>{

// canvas item
const el=document.createElement("div");
el.className="item";
el.style.left=obj.x+"px";
el.style.top=obj.y+"px";
el.style.width=obj.w+"px";
el.style.height=obj.h+"px";

if(obj.type==="text"){
el.contentEditable=true;
el.innerText=obj.text;
}

if(obj.type==="image"){
const img=document.createElement("img");
img.src=obj.src;
img.style.width="100%";
img.style.height="100%";
img.style.objectFit="cover";
el.appendChild(img);
}

canvas.appendChild(el);

// layer button
const layer=document.createElement("div");
layer.className="layer";
layer.innerText=obj.type;

if(obj.id===selected) layer.classList.add("active");

layer.onclick=()=>select(obj.id);

layers.appendChild(layer);

// interaction
init(el,obj);
});
}

/* SELECT */
function select(id){
selected=id;
render();
}

/* INIT DRAG + RESIZE */
function init(el,obj){

let down=false,ox,oy;

el.onmousedown=e=>{
down=true;
ox=e.offsetX;
oy=e.offsetY;
select(obj.id);
};

document.addEventListener("mousemove",e=>{
if(!down) return;

obj.x=e.pageX-ox-420;
obj.y=e.pageY-oy;

render();
});

document.addEventListener("mouseup",()=>{
if(down){
save();
down=false;
}
});
}

/* SAVE */
function save(){
localStorage.setItem("figma_simple",JSON.stringify(objects));
}

/* LOAD */
window.onload=()=>{
const saved=localStorage.getItem("figma_simple");
if(saved){
objects=JSON.parse(saved);
render();
}
};
</script>

</body>
</html>
