<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor</title>

<style>
body{
margin:0;
font-family:Arial;
}

#editBtn{
position:fixed;
top:10px;
left:10px;
padding:8px 14px;
background:black;
color:white;
border:none;
cursor:pointer;
z-index:1000;
display:none;
}

#panel{
position:fixed;
top:50px;
left:10px;
background:white;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
z-index:1000;
}

#canvas{
position:relative;
width:100%;
height:100vh;
}

.draggable{
position:absolute;
cursor:move;
}

.editing{
outline:2px dashed gray;
}
</style>
</head>

<body>

<button id="editBtn">Редактировать</button>

<div id="panel">
<button onclick="addText()">Добавить текст</button>
<br><br>
<input type="file" id="imgUpload">
<br><br>
Фон:
<input type="color" id="bgColor">
</div>

<div id="canvas"></div>

<script>
const ADMIN_KEY="123456";

const params=new URLSearchParams(location.search);
const isAdmin=params.get("admin")===ADMIN_KEY;

const editBtn=document.getElementById("editBtn");
const panel=document.getElementById("panel");
const canvas=document.getElementById("canvas");
const imgUpload=document.getElementById("imgUpload");
const bgColor=document.getElementById("bgColor");

if(isAdmin){
editBtn.style.display="block";
}

editBtn.onclick=()=>{
panel.style.display="block";
};

function addText(){
const div=document.createElement("div");
div.className="draggable editing";
div.contentEditable=true;
div.innerText="Новый текст";
div.style.left="100px";
div.style.top="100px";

canvas.appendChild(div);
makeDraggable(div);
save();
}

imgUpload.onchange=e=>{
const file=e.target.files[0];
const reader=new FileReader();

reader.onload=()=>{
const img=document.createElement("img");
img.src=reader.result;
img.className="draggable";
img.style.left="100px";
img.style.top="100px";
img.style.width="200px";

canvas.appendChild(img);
makeDraggable(img);
save();
};

reader.readAsDataURL(file);
};

function makeDraggable(el){
let offsetX,offsetY,drag=false;

el.onmousedown=e=>{
drag=true;
offsetX=e.offsetX;
offsetY=e.offsetY;
};

document.onmousemove=e=>{
if(!drag) return;
el.style.left=(e.pageX-offsetX)+"px";
el.style.top=(e.pageY-offsetY)+"px";
};

document.onmouseup=()=>{
if(drag) save();
drag=false;
};
}

bgColor.oninput=()=>{
document.body.style.background=bgColor.value;
save();
};

function save(){
localStorage.setItem("canvas",canvas.innerHTML);
localStorage.setItem("bg",document.body.style.background);
}

window.onload=()=>{
const saved=localStorage.getItem("canvas");
const bg=localStorage.getItem("bg");

if(saved){
canvas.innerHTML=saved;
document.querySelectorAll(".draggable").forEach(makeDraggable);
}

if(bg){
document.body.style.background=bg;
}
};
</script>

</body>
</html>
